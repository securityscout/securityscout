name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 8 * * 1"

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.9.x"
      - run: uv sync --frozen --dev
      - run: uv run pre-commit run --all-files
        env:
          SKIP: no-commit-to-branch

  typecheck:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.9.x"
      - run: uv sync --frozen --dev
      - run: uv run mypy src/

  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python-version: ["3.14"]
    services:
      redis:
        image: redis:7.4-alpine@sha256:4bfd9eca23339865dc14fe75f6d9ae643f714924623978dd2798f1a673b08f43
        ports:
          - 6379:6379
      postgres:
        image: postgres:16.4-alpine@sha256:f5aa7cac1dc299a77761ada5a5cf9c6ef4064bc85c89fed49c587dd2381d6f05
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.9.x"
          python-version: ${{ matrix.python-version }}
      - run: uv sync --frozen --dev
      - name: Tests (SQLite default suite)
        run: uv run pytest --cov=src --cov-report=term-missing -x -n auto --dist loadgroup -m "not postgres"
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          REDIS_URL: "redis://localhost:6379"
      - name: Tests (PostgreSQL marker suite)
        run: uv run pytest --cov=src --cov-append --cov-report=term-missing -x -n auto --dist loadgroup -m postgres
        env:
          DATABASE_URL: "sqlite+aiosqlite:///./test.db"
          REDIS_URL: "redis://localhost:6379"
          POSTGRES_TEST_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/postgres"
      - run: uv run coverage report --show-missing

  dep-audit:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.9.x"
      - run: uv export --no-hashes --no-emit-project --quiet > /tmp/requirements.txt
      - run: uvx pip-audit -r /tmp/requirements.txt --desc --strict

  docker:
    runs-on: ubuntu-24.04
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: false
          load: true
          tags: securityscout:ci-${{ github.sha }}
          build-args: |
            GIT_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Scan image for CVEs
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        with:
          image: securityscout:ci-${{ github.sha }}
          severity-cutoff: high
          only-fixed: true
          fail-build: true

  check:
    if: always()
    needs: [lint, typecheck, test, dep-audit, docker]
    runs-on: ubuntu-24.04
    steps:
      - uses: re-actors/alls-green@05ac9388f0aebcb5727afa17fcccfecd6f8ec5fe # v1.2.2
        with:
          allowed-skips: docker
          jobs: ${{ toJSON(needs) }}
