# Monitored repositories. Read once at startup; restart required after edits.
# Recommended: chmod 600 repos.yaml
repos:
  - name: <REPO_NAME>
    github_org: <GITHUB_ORG>
    github_repo: <GITHUB_REPO>
    # Optional. Git ref for sandbox clone when evidence has no oracle.vulnerable_ref (default: main).
    # default_git_ref: master
    mode: observe
    slack_channel: <SLACK_CHANNEL>
    allowed_workflows: []
    notify_on_severity: []
    require_approval_for: []
    issue_trackers: []
    dedup_semantic_search: false
    accepted_risk_ttl_days: 90
    # Tiered governance. Omit to keep strict approval for every
    # finding above informational. Precedence: approve > notify > auto_resolve.
    # governance:
    #   auto_resolve:
    #     - severity: [informational, low]
    #     - duplicate: true
    #   notify:
    #     - severity: [medium]
    #     - ssvc_action: [attend, track]
    #   approve:
    #     - severity: [critical, high]
    #     - ssvc_action: [immediate]
