name: securityscout

x-logging: &logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"
    compress: "true"

x-app-common: &app-common
  build:
    context: .
    dockerfile: Dockerfile
  image: ${SCOUT_IMAGE:-securityscout:local}
  logging: *logging
  environment:
    LOG_LEVEL: ${LOG_LEVEL:-INFO}
    TRUSTED_HOSTS: '["${CADDY_DOMAIN:?CADDY_DOMAIN required}","localhost","127.0.0.1"]'
  secrets:
    - database_url
    - redis_url
    - github_webhook_secret
    - github_pat
    - slack_bot_token
    - slack_signing_secret
    - anthropic_api_key
  user: "1000:1000"
  read_only: true
  tmpfs:
    - /tmp:size=64m,mode=1777
  security_opt:
    - no-new-privileges:true
  volumes:
    - ./repos.yaml:/app/repos.yaml:ro
  pids_limit: 256
  cap_drop:
    - ALL
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  caddy:
    image: caddy:2.8-alpine@sha256:b95ed06fbc6d74d24a40902090c8cc6086ce7d08ba60a3a7e8e62bf164a9d7bb
    restart: unless-stopped
    logging: *logging
    networks:
      - frontend
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp" # HTTP/3 (QUIC)
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      CADDY_DOMAIN: ${CADDY_DOMAIN:?CADDY_DOMAIN required}
      CADDY_EMAIL: ${CADDY_EMAIL:?CADDY_EMAIL required}
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - CHOWN
      - DAC_OVERRIDE
      - SETGID
      - SETUID
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:2019/metrics"]
      interval: 30s
      timeout: 5s
      retries: 3
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M

  app:
    <<: *app-common
    restart: unless-stopped
    networks:
      - frontend
      - backend
    command:
      - uvicorn
      - main:app
      - --host=0.0.0.0
      - --port=8000
      - --workers=2
      - --no-server-header
      - --proxy-headers
      - --forwarded-allow-ips=*
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - |
          import sys, urllib.request
          r = urllib.request.urlopen("http://127.0.0.1:8000/healthz", timeout=2)
          sys.exit(0 if r.status == 200 else 1)
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  worker:
    <<: *app-common
    restart: unless-stopped
    stop_grace_period: 45s
    networks:
      - frontend
      - backend
    command: ["python", "/app/src/run_worker.py"]
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          memory: 128M

  postgres:
    image: postgres:16.4-alpine@sha256:f5aa7cac1dc299a77761ada5a5cf9c6ef4064bc85c89fed49c587dd2381d6f05
    restart: unless-stopped
    logging: *logging
    networks:
      - backend
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-scout}
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
      POSTGRES_DB: ${POSTGRES_DB:-security_scout}
      PGDATA: /var/lib/postgresql/data/pgdata
    secrets:
      - postgres_password
    volumes:
      - postgres-data:/var/lib/postgresql/data
    shm_size: 256m
    pids_limit: 128
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U "${POSTGRES_USER:-scout}" -d "${POSTGRES_DB:-security_scout}"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7.4-alpine@sha256:4bfd9eca23339865dc14fe75f6d9ae643f714924623978dd2798f1a673b08f43
    restart: unless-stopped
    logging: *logging
    networks:
      - backend
    command:
      - sh
      - -c
      - |
        cp /etc/redis/redis.conf /tmp/redis.conf
        printf 'requirepass %s\n' "$$(cat /run/secrets/redis_password)" >> /tmp/redis.conf
        exec redis-server /tmp/redis.conf
    secrets:
      - redis_password
    volumes:
      - redis-data:/data
      - ./deploy/redis.conf:/etc/redis/redis.conf:ro
    tmpfs:
      - /tmp:size=1m,mode=1777
    pids_limit: 128
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test:
        - CMD-SHELL
        - redis-cli -a "$$(cat /run/secrets/redis_password)" --no-auth-warning ping | grep -q PONG
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 320M

  migrate:
    <<: *app-common
    restart: "no"
    networks:
      - backend
    command: ["alembic", "upgrade", "head"]
    healthcheck:
      test: ["NONE"]
    profiles:
      - migrate

networks:
  frontend: {}
  backend:
    internal: true

volumes:
  postgres-data:
  redis-data:
  caddy-data:
  caddy-config:

secrets:
  database_url:
    file: ./secrets/database_url.txt
  redis_url:
    file: ./secrets/redis_url.txt
  github_webhook_secret:
    file: ./secrets/github_webhook_secret.txt
  github_pat:
    file: ./secrets/github_pat.txt
  slack_bot_token:
    file: ./secrets/slack_bot_token.txt
  slack_signing_secret:
    file: ./secrets/slack_signing_secret.txt
  anthropic_api_key:
    file: ./secrets/anthropic_api_key.txt
  postgres_password:
    file: ./secrets/postgres_password.txt
  redis_password:
    file: ./secrets/redis_password.txt
